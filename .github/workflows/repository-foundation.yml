name: Repository Foundation

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  foundation:
    name: Validate repository foundation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Makefile help
        run: make help

      - name: Validate public-safe file patterns
        run: make security-check

      - name: Run repository validation tests
        run: make test-all

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Confirm documentation exists
        run: |
          test -f README.md
          test -f docs/ROADMAP.md
          test -f docs/SECURITY.md
          test -f docs/ARCHITECTURE.md
          test -f docs/runbooks/TEARDOWN.md
